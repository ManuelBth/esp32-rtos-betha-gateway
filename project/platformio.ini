; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:rymcu-esp32-devkitc]
platform = espressif32
board = rymcu-esp32-devkitc
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv
lib_deps =
	milesburton/DallasTemperature@^4.0.5
	adafruit/DHT sensor library@^1.4.0
	adafruit/Adafruit Unified Sensor@^1.1.4
	bodmer/TFT_eSPI@^2.5.43
	paulstoffregen/XPT2046_Touchscreen@0.0.0-alpha+sha.26b691b2c8
	lvgl/lvgl@8.3.11
	knolleary/PubSubClient@^2.8
	plerup/EspSoftwareSerial@^8.2.0
	adafruit/RTClib@^2.1.3

build_flags =
	-I src/
	-D LV_CONF_INCLUDE_SIMPLE
	-D LV_CONF_SUPPRESS_DEFINE_CHECK
	-D EEZ_FOR_LVGL
	-D DEBUG_LEVEL=3

	; Optimizaciones de tamaño (ya aplicadas por defecto, mantenidas explícitas)
	-Os

	-D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384
	-D CONFIG_ESP32_TIMER_TASK_STACK_SIZE=8192
	-D USER_SETUP_LOADED=1
	-D ILI9341_DRIVER=1
	-D TFT_MISO=19
	-D TFT_MOSI=23
	-D TFT_SCLK=18
	-D TFT_CS=15
	-D TFT_DC=2
	-D TFT_RST=-1
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D SPI_FREQUENCY=55000000
	-D SPI_TOUCH_FREQUENCY=2500000
	-D CORE_DEBUG_LEVEL=0        ; Deshabilitado para reducir flash (antes =3
